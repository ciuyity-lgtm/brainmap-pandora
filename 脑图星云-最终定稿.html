  nodes = Array.from(m.values());
  var ids = new Set(nodes.map(function(n){ return n.id; }));
  edges = window.D.edges.filter(function(e){ return ids.has(e.source) && ids.has(e.target); });
})();

var SIG_C = {'正向':'#16a34a','负向':'#dc2626','中性':'#f59e0b','低配':'#64748b','N/A':'#475569'};
var SIG_E = {'正向':'#22c55e','负向':'#ef4444','中性':'#fbbf24'};

function getRadius(s) {
  if (s >= 60) return 3.8;
  if (s >= 55) return 3.0;
  if (s >= 50) return 2.4;
  if (s >= 45) return 1.8;
  if (s >= 40) return 1.4;
  if (s >= 35) return 1.1;
  if (s >= 30) return 0.9;
  return 0.7;
}

// ---- 力导向布局 ----
var nodeIdx = {};
nodes.forEach(function(n,i){ nodeIdx[n.id] = i; });

function computeLayout(nodes, edges, iterations) {
  var n = nodes.length;
  var p = new Float32Array(n*3);
  var v = new Float32Array(n*3);
  var m = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var t = Math.acos(2*Math.random()-1);
    var f = Math.random() * 6.2832;
    p[i*3] = 120 * Math.sin(t) * Math.cos(f);
    p[i*3+1] = 120 * Math.sin(t) * Math.sin(f);
    p[i*3+2] = 120 * Math.cos(t);
    m[i] = getRadius(nodes[i].symbolSize) * 0.8 + 0.5;
  }
  for (var it = 0; it < iterations; it++) {
    var tmp = 3 * (1 - it/iterations);
    for (var i = 0; i < n; i++) {
      for (var j = i+1; j < n; j++) {
        var dx = p[i*3]-p[j*3], dy = p[i*3+1]-p[j*3+1], dz = p[i*3+2]-p[j*3+2];
        var d = Math.sqrt(dx*dx+dy*dy+dz*dz) || 0.1;
        if (d > 200) continue;
        var f2 = 2800 / (d*d);
        v[i*3] += f2*dx/d/m[i]; v[i*3+1] += f2*dy/d/m[i]; v[i*3+2] += f2*dz/d/m[i];
        v[j*3] -= f2*dx/d/m[j]; v[j*3+1] -= f2*dy/d/m[j]; v[j*3+2] -= f2*dz/d/m[j];
      }
    }
    for (var ei = 0; ei < edges.length; ei++) {
      var e = edges[ei];
      var si = nodeIdx[e.source], ti = nodeIdx[e.target];
      if (si === undefined || ti === undefined) continue;
      var dx = p[ti*3]-p[si*3], dy = p[ti*3+1]-p[si*3+1], dz = p[ti*3+2]-p[si*3+2];
      var d = Math.sqrt(dx*dx+dy*dy+dz*dz) || 0.1;
      var f2 = d * 0.04;
      v[si*3] += f2*dx/d/m[si]; v[si*3+1] += f2*dy/d/m[si]; v[si*3+2] += f2*dz/d/m[si];
      v[ti*3] -= f2*dx/d/m[ti]; v[ti*3+1] -= f2*dy/d/m[ti]; v[ti*3+2] -= f2*dz/d/m[ti];
    }
    for (var i = 0; i < n; i++) {
      v[i*3] -= p[i*3] * 0.003;
      v[i*3+1] -= p[i*3+1] * 0.003;
      v[i*3+2] -= p[i*3+2] * 0.003;
      v[i*3] *= 0.85; v[i*3+1] *= 0.85; v[i*3+2] *= 0.85;
      var sp = Math.sqrt(v[i*3]*v[i*3]+v[i*3+1]*v[i*3+1]+v[i*3+2]*v[i*3+2]);
      if (sp > tmp) { v[i*3]*=tmp/sp; v[i*3+1]*=tmp/sp; v[i*3+2]*=tmp/sp; }
      p[i*3] += v[i*3]; p[i*3+1] += v[i*3+1]; p[i*3+2] += v[i*3+2];
    }
  }
  return p;
}

var raycaster = new THREE.Raycaster();

function getSphereMeshes() {
  var arr = [];
  planetGroup.children.forEach(function(g){
    if (g.children && g.children[0] && g.children[0].isMesh) arr.push(g.children[0]);
  });
  return arr;

renderer.domElement.addEventListener('mousemove', function(e){
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(getSphereMeshes());
  if (hits.length > 0) {
    var hit = hits[0].object;
    var hitId = null;
    Object.keys(planetData).forEach(function(id){ if(planetData[id].sph===hit) hitId=id; });
    if (hitId && planetData[hitId].nd) {
      var nd = planetData[hitId].nd;
      ttName.textContent = nd.name;
      ttCode.textContent = nd.id + '  ' + (nd.industry||'');
      tt.style.left = (e.clientX+16)+'px';
      tt.style.top = (e.clientY-10)+'px';
      tt.classList.add('on');
      if (prevHover !== hitId) {
        if (planetData[hitId]) { planetData[hitId].g.scale.set(1.5,1.5,1.5); planetData[hitId].glow.material.opacity = 0.25; }
        if (prevHover && planetData[prevHover]) { planetData[prevHover].g.scale.set(1,1,1); planetData[prevHover].glow.material.opacity = 0.08; }
        prevHover = hitId;
      }
      return;
    }
  }
  tt.classList.remove('on');
  if (prevHover && planetData[prevHover]) { planetData[prevHover].g.scale.set(1,1,1); planetData[prevHover].glow.material.opacity = 0.08; }
  prevHover = null;
});

// ==================== 星系模式 ====================
var galaxyMode = false;
var galaxyCenter = null;
var galaxyMembers = [];
var galaxyAnimProg = 0;
var galaxyTargetPos = {};
var galaxyOrigPos = {};
var galaxyTransitioning = false;
var galaxyCamAnim = null;
var galaxyStoredRot = null;
var galaxyLaserGroup = null;
var galaxyLaserPending = false;

// 不用 try_ (reserved word), 用 gry
var gry = 0, grx = 0; // 目标旋转
var curRx = 0, curRy = 0; // 当前旋转
var velX = 0, velY = 0;
var zoom = 220;
var isDragging = false;
var prevMouse = {x:0, y:0};
var autoRotate = true;
var rotPaused = false;
var pauseTimer = null;

function enterGalaxy(centerId) {
  if (galaxyTransitioning) return;
  if (galaxyMode && galaxyCenter === centerId) { exitGalaxy(); return; }
  
  galaxyMode = true;
  galaxyCenter = centerId;
  galaxyTransitioning = false;
  galaxyAnimProg = 0;
  galaxyTransitioning = true;
  
  // 收集关联节点
  var relatedIds = new Set([centerId]);
  edges.forEach(function(e){
    if (e.source === centerId) relatedIds.add(e.target);
    if (e.target === centerId) relatedIds.add(e.source);
  });
  galaxyMembers = [centerId];
  relatedIds.forEach(function(id){ if (id !== centerId) galaxyMembers.push(id); });
  
  galaxyOrigPos = {};
  galaxyTargetPos = {};
  
  var cp = (planetData[centerId] && planetData[centerId].g.position) 
    ? planetData[centerId].g.position.clone() : new THREE.Vector3(0,0,0);
  
  var ma = Array.from(relatedIds);
  var angleStep = 6.2832 / (ma.length - 1 || 1);
  var orbitR = 25;
  var mi = 0;
  
  Object.keys(planetData).forEach(function(id){
    var p = planetData[id];
    if (!p) return;
    galaxyOrigPos[id] = p.g.position.clone();
    if (id === centerId) {
      galaxyTargetPos[id] = new THREE.Vector3(0,0,0);
    } else if (relatedIds.has(id)) {
      var a = mi * angleStep + Math.random()*0.5;
      galaxyTargetPos[id] = new THREE.Vector3(
        Math.cos(a)*orbitR, (Math.random()-0.5)*2, Math.sin(a)*orbitR
      );
      mi++;
    } else {
      galaxyTargetPos[id] = p.g.position.clone().multiplyScalar(3);
    }
  });
  
  // 相机飞向
  galaxyCamAnim = {
    active: true,
    startPos: camera.position.clone(),
    endPos: new THREE.Vector3(0, 6, 60),
    progress: 0
  };
  galaxyStoredRot = {rx: grx, ry: gry};
  
  galaxyLaserPending = true;
  galaxyAnimProg = 0.01;
}

function exitGalaxy() {
  galaxyMode = false;
  galaxyCenter = null;
  galaxyAnimProg = 0;
  galaxyTransitioning = false;
  galaxyCamAnim = null;
  
  // 恢复所有节点
  Object.keys(planetData).forEach(function(id){
    var p = planetData[id];
    if (!p) return;
    p.g.scale.set(1,1,1);
    p.glow.material.opacity = 0.08;
    p.glow.scale.set(1,1,1);
  });
  
  // 清除激光线
  if (galaxyLaserGroup) { scene.remove(galaxyLaserGroup); galaxyLaserGroup = null; }
  // 清除标签
  if (window._galaxyLabels) {
    Object.keys(window._galaxyLabels).forEach(function(id){ scene.remove(window._galaxyLabels[id]); });
    window._galaxyLabels = null;
  }
  galaxyLaserPending = false;
}

function createGalaxyLasers() {
  if (!galaxyMode || !galaxyCenter) return;
  if (galaxyLaserGroup) scene.remove(galaxyLaserGroup);
  galaxyLaserGroup = new THREE.Group();
  scene.add(galaxyLaserGroup);
  
  var orbitR = 25;
  
  // 中心到关联的线
  var le = edges.filter(function(e){ return (e.source===galaxyCenter||e.target===galaxyCenter) && e.source!==e.target; });
  le.forEach(function(e){
    var sp = planetData[e.source] ? planetData[e.source].g.position : null;
    var tp = planetData[e.target] ? planetData[e.target].g.position : null;
    if (!sp || !tp) return;
    var mx = (sp.x+tp.x)/2, my = (sp.y+tp.y)/2+4, mz = (sp.z+tp.z)/2;
    var col = e.relation==='supplier'?'#22d3ee':e.relation==='customer'?'#fbbf24':'#a78bfa';
    var curve = new THREE.QuadraticBezierCurve3(sp.clone(), new THREE.Vector3(mx,my,mz), tp.clone());
    var line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curve.getPoints(20)),
      new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending, depthWrite:false})
    );
    line.userData = {sid:e.source, tid:e.target};
    galaxyLaserGroup.add(line);
  });
  
  // 关联节点之间的线（距离 ≤ orbitR * 0.6 才画）
  var relatedIds = galaxyMembers.filter(function(id){ return id !== galaxyCenter; });
  var maxDist = orbitR * 0.6;
  for (var i = 0; i < relatedIds.length; i++) {
    for (var j = i + 1; j < relatedIds.length; j++) {
      var pi = planetData[relatedIds[i]];
      var pj = planetData[relatedIds[j]];
      if (!pi || !pj) continue;
      var dist = pi.g.position.distanceTo(pj.g.position);
      if (dist <= maxDist) {
        var col = '#4488ff';
        var curve = new THREE.LineCurve3(pi.g.position.clone(), pj.g.position.clone());
        var line = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(curve.getPoints(10)),
          new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.2, blending:THREE.AdditiveBlending, depthWrite:false})
        );
        galaxyLaserGroup.add(line);
      }
    }
  }
}

function createGalaxyLabels() {
  if (window._galaxyLabels) {
    Object.keys(window._galaxyLabels).forEach(function(id){ scene.remove(window._galaxyLabels[id]); });
  }
  window._galaxyLabels = {};
  
  galaxyMembers.forEach(function(id){
    var nd = null;
    for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === id) { nd = nodes[i]; break; } }
    var p = planetData[id];
    if (!nd || !p) return;
    
    var ca = document.createElement('canvas');
    var cx = ca.getContext('2d');
    ca.width = 480;
    ca.height = 96;
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    
    var isCenter = (id === galaxyCenter);
    var fontSize = isCenter ? 36 : 26;
    cx.shadowColor = 'rgba(0,0,0,0.95)';
    cx.shadowBlur = 20;
    cx.font = '400 ' + fontSize + 'px -apple-system, "PingFang SC", sans-serif';
    cx.fillStyle = isCenter ? '#fff' : 'rgba(255,255,255,0.85)';
    cx.fillText(nd.name, ca.width/2, ca.height/2 - 6);
    
    // 信号
    var bc = {'正向':'#16a34a','负向':'#dc2626','中性':'#f59e0b'};
    cx.shadowBlur = 0;
    cx.font = '200 13px -apple-system, "PingFang SC", sans-serif';
    cx.fillStyle = bc[nd.value] || '#64748b';
    cx.fillText(nd.value || '', ca.width/2, ca.height/2 + 18);
    
    cx.shadowBlur = 8;
    cx.shadowColor = 'rgba(0,0,0,0.9)';
    cx.font = '200 12px -apple-system, "PingFang SC", sans-serif';
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.fillText(id, ca.width/2, ca.height/2 + 34);
    
    var tex = new THREE.CanvasTexture(ca);
    tex.needsUpdate = true;
    var sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map:tex, transparent:true, opacity:1, depthWrite:false, blending:THREE.AdditiveBlending
    }));
    var sc = isCenter ? 28 : 20;
    sprite.scale.set(sc, sc*0.22, 1);
    var pos = p.g.position;
    sprite.position.set(pos.x, pos.y + getRadius(nd.symbolSize) + 0.8, pos.z);
    scene.add(sprite);
    window._galaxyLabels[id] = sprite;
  });
}

renderer.domElement.addEventListener('click', function(e){
  if (isDragging) return;
  var rect = renderer.domElement.getBoundingClientRect();
  var mx = ((e.clientX-rect.left)/rect.width)*2 - 1;
  var my = -((e.clientY-rect.top)/rect.height)*2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(mx,my), camera);
  var hits = raycaster.intersectObjects(getSphereMeshes());
  if (hits.length > 0) {
    var hit = hits[0].object;
    var hitId = null;
    Object.keys(planetData).forEach(function(id){ if(planetData[id].sph===hit) hitId=id; });
    if (hitId) {
      if (galaxyMode && galaxyCenter === hitId) { exitGalaxy(); } else { enterGalaxy(hitId); }
      return;
    }
  }
  if (galaxyMode) exitGalaxy();
});

  var q = this.value.trim().toLowerCase();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){
    Object.keys(planetData).forEach(function(id){
      var p = planetData[id];
      var match = q && (id.toLowerCase().includes(q) || (p.nd.name||'').toLowerCase().includes(q));
      if (match) { p.g.scale.set(2,2,2); p.glow.material.opacity = 0.3; }
      else if (q) { p.g.scale.set(0.3,0.3,0.3); p.glow.material.opacity = 0; }
      else { p.g.scale.set(1,1,1); p.glow.material.opacity = 0.08; }
    });
  }, 200);
});

// ---- 键盘 ----
window.addEventListener('keydown', function(e){
  if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
  if (e.key === 'r' || e.key === 'R') { autoRotate = !autoRotate; }
  if (e.key === '/' || e.key === 's') { e.preventDefault(); searchInput.focus(); document.getElementById('srch').classList.add('on'); }
  if (e.key === 'Escape') {
    if (galaxyMode) exitGalaxy();
    searchInput.blur();
    searchInput.value = '';
    searchInput.dispatchEvent(new Event('input'));
    document.getElementById('srch').classList.remove('on');
  }
});

window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== 动画循环 ====================
var time = 0;

function animate(timestamp) {
  requestAnimationFrame(animate);
  time += 0.005;
  
  // 相机飞行
  if (galaxyCamAnim && galaxyCamAnim.active) {
    galaxyCamAnim.progress = Math.min(1, galaxyCamAnim.progress + 0.025);
    var ease = 1 - Math.pow(1 - galaxyCamAnim.progress, 3);
    camera.position.lerpVectors(galaxyCamAnim.startPos, galaxyCamAnim.endPos, ease);
    if (galaxyCamAnim.progress >= 1) galaxyCamAnim.active = false;
  }
  
  // 自动旋转
  if (autoRotate && !rotPaused && !galaxyMode) gry += 0.002;
  
  // 旋转平滑
  if (!galaxyMode) {
    curRx += (grx - curRx) * 0.08;
    curRy += (gry - curRy) * 0.08;
  }
  
  // 拖拽惯性
  if (!isDragging && rotPaused && !galaxyMode) {
    gry += velX * 0.02;
    grx += velY * 0.02;
    grx = Math.max(-1.2, Math.min(1.2, grx));
    velX *= 0.92;
    velY *= 0.92;
    if (Math.abs(velX) < 0.0001 && Math.abs(velY) < 0.0001) { velX = 0; velY = 0; }
  }
  
  if (!galaxyMode) {
    scene.rotation.x = curRx;
    scene.rotation.y = curRy;
    camera.position.z += (zoom - camera.position.z) * 0.08;
  }
  
  // 浮动粒子
  var fp = window._fp, fpv = window._fpv, fpn = window._fpn;
  if (fp) {
    var pp = fp.geometry.attributes.position.array;
    for (var i = 0; i < fpn; i++) {
      pp[i*3] += fpv[i].x;
      pp[i*3+1] += fpv[i].y;
      pp[i*3+2] += fpv[i].z;
      var d = Math.sqrt(pp[i*3]*pp[i*3] + pp[i*3+1]*pp[i*3+1] + pp[i*3+2]*pp[i*3+2]);
      if (d > 200) {
        pp[i*3] *= 0.99; pp[i*3+1] *= 0.99; pp[i*3+2] *= 0.99;
        fpv[i].x *= -0.5; fpv[i].y *= -0.5; fpv[i].z *= -0.5;
      }
    }
    fp.geometry.attributes.position.needsUpdate = true;
  }
  
  // ---- 星系模式过渡 ----
  if (galaxyAnimProg > 0 && galaxyAnimProg < 1) {
    galaxyAnimProg = Math.min(1, galaxyAnimProg + 0.02);
    var ease2 = 1 - Math.pow(1 - galaxyAnimProg, 3);
    Object.keys(galaxyTargetPos).forEach(function(id){
      var p = planetData[id];
      if (!p || !galaxyTargetPos[id]) return;
      var src = galaxyOrigPos[id] || p.g.position;
      p.g.position.lerpVectors(src, galaxyTargetPos[id], ease2);
      var ts = galaxyTargetPos[id].length() > 100 ? 0.15 : (id === galaxyCenter ? 1.0 : 0.7);
      p.g.scale.setScalar(p.g.scale.x + (ts - p.g.scale.x) * 0.08);
    });
    
    if (galaxyAnimProg >= 1) {
      galaxyTransitioning = false;
      if (galaxyCenter && planetData[galaxyCenter]) {
        planetData[galaxyCenter].g.scale.set(1.0,1.0,1.0);
        planetData[galaxyCenter].glow.material.opacity = 0.25;
        planetData[galaxyCenter].glow.scale.set(1.5,1.5,1.5);
      }
      galaxyMembers.forEach(function(mid){
        if (mid === galaxyCenter) return;
        var p = planetData[mid];
        if (!p) return;
        p.g.scale.set(0.7,0.7,0.7);
        p.glow.material.opacity = 0.15;
        p.glow.scale.set(2,2,2);
      });
      if (galaxyLaserPending) {
        galaxyLaserPending = false;
        createGalaxyLasers();
        createGalaxyLabels();
      }
      
      // 确保标签出现（延迟保护）
      if (galaxyMode && !galaxyTransitioning && !window._galaxyLabels) {
        createGalaxyLabels();
      }
    }
  }
  
  // ---- 公转 ----
  if (galaxyMode && !galaxyTransitioning && galaxyMembers.length > 1) {
    var lc = galaxyTargetPos[galaxyCenter] || new THREE.Vector3(0,0,0);
    var orbSpeed = 0.003;
    galaxyMembers.forEach(function(mid){
      if (mid === galaxyCenter) return;
      var p = planetData[mid];
      if (!p) return;
      var pos = p.g.position;
      var dx = pos.x - lc.x;
      var dz = pos.z - lc.z;
      var ang = Math.atan2(dz, dx) + orbSpeed;
      var dist = Math.sqrt(dx*dx + dz*dz);
      pos.x = lc.x + Math.cos(ang) * dist;
      pos.z = lc.z + Math.sin(ang) * dist;
      pos.y += Math.sin(Date.now()*0.001 + mid.charCodeAt(0)) * 0.05;
    });
    
    // 更新激光线
    if (galaxyLaserGroup) {
      galaxyLaserGroup.children.forEach(function(line){
        var ud = line.userData;
        if (!ud || !ud.sid || !ud.tid) return;
        var p1 = planetData[ud.sid] ? planetData[ud.sid].g.position : null;
        var p2 = planetData[ud.tid] ? planetData[ud.tid].g.position : null;
        if (!p1 || !p2) return;
        var mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2 + 4 + Math.sin(Date.now()*0.002)*2, mz = (p1.z+p2.z)/2;
        var curve = new THREE.QuadraticBezierCurve3(p1.clone(), new THREE.Vector3(mx,my,mz), p2.clone());
        line.geometry.dispose();
        line.geometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(20));
      });
    }
  }
  
  // 标签位置跟踪
  if (galaxyMode) {
    if (!window._galaxyLabels) createGalaxyLabels();
    Object.keys(window._galaxyLabels).forEach(function(id){
      var p = planetData[id];
      if (!p) return;
      var pos = p.g.position;
      window._galaxyLabels[id].position.set(pos.x, pos.y + getRadius(p.nd.symbolSize) + 0.8, pos.z);
    });
  }
  
  // 光环旋转
  planetGroup.children.forEach(function(g, idx){
    if (g.children) g.children.forEach(function(c){
      if (c.isPoints) { c.rotation.z += 0.003; c.rotation.x += 0.001; }
      if (c.isMesh && c !== g.children[0]) c.scale.setScalar(1 + Math.sin(time*2+idx)*0.05);
    });
  });
  
  renderer.render(scene, camera);
}

// ---- 启动 ----
setTimeout(function(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('title').classList.add('ui-on');
  document.getElementById('stats').classList.add('ui-on');
  document.getElementById('hint').classList.add('ui-on');
  document.getElementById('stats').textContent = nodes.length + ' 恒星 · ' + edges.length + ' 星脉';
  setTimeout(function(){ document.getElementById('srch').classList.add('on'); }, 2000);
}, 2500);

animate(0);
console.log('✅ 潘多拉星云启动:', nodes.length, '恒星');

} catch(e) {
  console.error('ERROR:', e.message, e.stack);
}
})();
</script></body></html>
